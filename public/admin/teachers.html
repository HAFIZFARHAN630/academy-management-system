<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers — ClickTake Academy</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>

<body class="gradient-mesh">
    <div class="admin-layout" id="app"></div>

    <div class="modal-overlay" id="modal-overlay" style="z-index: 2000;">
        <div class="modal" style="max-width:620px;">
            <div class="modal-header">
                <h3 id="modal-title">Add Teacher</h3>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <form id="teacher-form" onsubmit="saveTeacher(event)">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Full Name <span class="req">*</span></label><input class="form-control" id="f-name" placeholder="e.g. Ahmad Ali" required></div>
                        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email" placeholder="e.g. teacher@example.com"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Phone <span class="req">*</span> <small class="text-muted" id="phone-prefix-hint"></small></label><input class="form-control" id="f-phone" placeholder="03xx-xxxxxxx" required></div>
                        <div class="form-group"><label class="form-label">Emergency Contact</label><input class="form-control" id="f-emergency" placeholder="03xx-xxxxxxx"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">CNIC</label><input class="form-control" id="f-cnic" placeholder="00000-0000000-0"></div>
                        <div class="form-group"><label class="form-label">Subject(s)</label><input class="form-control" id="f-subject" placeholder="e.g. Mathematics, Physics"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Full Address</label><textarea class="form-control" id="f-address" rows="2" placeholder="Teacher's residential address..."></textarea></div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Qualification</label><input class="form-control" id="f-qual" placeholder="e.g. M.Sc. Mathematics"></div>
                        <div class="form-group"><label class="form-label">Joining Date</label><input class="form-control" id="f-joining" type="date"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Salary Type</label>
                            <select class="form-control" id="f-salary-type" onchange="toggleSalaryFields()">
                                <option value="fixed">Fixed Monthly</option>
                                <option value="hourly">Hourly Rate</option>
                            </select>
                        </div>
                        <div class="form-group" id="salary-fixed-grp"><label class="form-label">Base Salary</label><input class="form-control" id="f-base-salary" type="number" placeholder="e.g. 35000"></div>
                        <div class="form-group hidden" id="salary-hourly-grp"><label class="form-label">Hourly Rate</label><input class="form-control" id="f-hourly" type="number" placeholder="e.g. 250"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Teacher Photo</label>
                            <input type="file" class="form-control" id="f-photo" accept="image/*" onchange="previewImage(this, 'photo-preview')">
                            <div id="photo-preview-container" class="mt-2" style="display:none;">
                                <img id="photo-preview" src="" style="width:100px;height:100px;object-fit:cover;border-radius:var(--radius-md);">
                            </div>
                            <input type="hidden" id="f-photo-url">
                        </div>
                        <div class="form-group" id="f-status-grp" style="display:none;">
                            <label class="form-label">Status</label>
                            <select class="form-control" id="f-status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Add Teacher</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Credential Slip Modal -->
    <div class="modal-overlay" id="cred-modal" style="z-index: 2000;">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3 id="cred-title">🎉 Account Created</h3>
                <button class="btn-close"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body">
                <p class="text-secondary text-sm" style="margin-bottom:var(--space-4);">Share these credentials with the
                    teacher securely. The temporary password must be changed on first login.</p>
                <div class="cred-slip">
                    <div class="cred-field"><span class="cred-key">Login ID</span><span class="cred-val"
                            id="c-login-id">—</span></div>
                    <div class="cred-field"><span class="cred-key">Temp Password</span><span class="cred-val"
                            id="c-temp-pwd">—</span></div>
                    <div class="cred-field"><span class="cred-key">Name</span><span class="cred-val"
                            id="c-name">—</span></div>
                    <div class="cred-field"><span class="cred-key">Portal URL</span><span class="cred-val text-sm"
                            style="color:var(--color-accent-teal);">/login.html?role=teacher</span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="copyCreds()">📋 Copy</button>
                <button class="btn btn-secondary" onclick="printCred()">🖨️ Print</button>
                <button class="btn btn-primary"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">Done</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/face-api.min.js"></script>
    <script src="/js/face-auth.js"></script>
    <script>
        document.getElementById('app').innerHTML = `
    ${getSidebarHTML('teachers')}
    <main class="main-content">
      ${getTopbarHTML('Teachers')}
      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h3>👨‍🏫 All Teachers</h3>
            <div class="flex items-center gap-3">
              <div class="search-bar"><span>🔍</span><input type="text" id="search-input" placeholder="Search teachers..." oninput="filterTable()" onkeydown="if(event.key==='Enter') filterTable()"></div>
              <select class="form-control" style="width:150px;padding:8px 12px;" id="status-filter" onchange="filterTable()">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
              </select>
              <button class="btn btn-primary" onclick="openAddModal()">➕ Add Teacher</button>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table" id="teachers-table">
              <thead>
                <tr><th>Teacher</th><th>Subject</th><th>Phone</th><th>Face ID</th><th>Status</th><th>Last Login</th><th>Actions</th></tr>
              </thead>
              <tbody id="teachers-tbody"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>`;

        initAdminLayout('/admin/teachers.html');

        let allTeachers = [];
        let editingId = null;

        async function loadTeachers() {
            try {
                allTeachers = await API.get('/users/teachers');
                renderTable(allTeachers);
            } catch (e) { toast(e.message, 'error'); }
        }

        function renderTable(teachers) {
            const tbody = document.getElementById('teachers-tbody');
            if (!teachers.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">No teachers found</td></tr>'; return; }
            tbody.innerHTML = teachers.map(t => `
      <tr>
        <td>
          <div class="flex items-center gap-3">
            <div class="avatar" style="background:var(--color-primary);color:#fff;overflow:hidden;">
                ${t.photo ? `<img src="${t.photo}" style="width:100%;height:100%;object-fit:cover;">` : avatarLetter(t.full_name)}
            </div>
            <div>
              <div class="font-semibold">${t.full_name}</div>
              <div class="text-xs text-muted">${t.login_id}</div>
            </div>
          </div>
        </td>
        <td><span class="text-sm">${t.subject || '—'}</span></td>
        <td><span class="text-sm">${t.phone}</span></td>
        <td><span class="badge ${t.is_face_enrolled ? 'badge-green' : 'badge-amber'}" title="Face ID Status">${t.is_face_enrolled ? '🟢 Ready' : '🟡 Pending'}</span></td>
        <td><span class="badge ${t.status === 'active' ? 'badge-green' : 'badge-red'}">${t.status}</span></td>
        <td><span class="text-sm text-muted">${t.last_login ? timeAgo(t.last_login) : 'Never'}</span></td>
        <td>
          <div class="flex gap-2">
            <button class="btn btn-sm btn-secondary btn-icon action-edit" data-id="${t.id}" title="Edit">✏️</button>
            <button class="btn btn-sm btn-secondary btn-icon action-reset-pwd" data-id="${t.id}" data-name="${t.full_name.replace(/"/g, '&quot;')}" title="Reset Password">🔑</button>
            <button class="btn btn-sm btn-secondary btn-icon action-reset-face" data-id="${t.id}" data-name="${t.full_name.replace(/"/g, '&quot;')}" data-enrolled="${t.is_face_enrolled}" title="${t.is_face_enrolled ? 'Re-enroll Face' : 'Enroll Face'}">📸</button>
            <button class="btn btn-sm btn-danger btn-icon action-deactivate" data-id="${t.id}" data-name="${t.full_name.replace(/"/g, '&quot;')}" title="Deactivate">🗑️</button>
          </div>
        </td>
      </tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const s = document.getElementById('status-filter').value;
            const filtered = allTeachers.filter(t =>
                (!q || t.full_name.toLowerCase().includes(q) || t.login_id.toLowerCase().includes(q) || (t.phone || '').includes(q)) &&
                (!s || t.status === s)
            );
            renderTable(filtered);
        }

        function toggleSalaryFields() {
            const type = document.getElementById('f-salary-type').value;
            document.getElementById('salary-fixed-grp').classList.toggle('hidden', type !== 'fixed');
            document.getElementById('salary-hourly-grp').classList.toggle('hidden', type !== 'hourly');
        }

        function previewImage(input, previewId) {
            const container = document.getElementById(previewId + '-container');
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('teacher-form').reset();
            document.getElementById('modal-title').textContent = 'Add New Teacher';
            document.getElementById('save-btn').textContent = 'Add Teacher';
            document.getElementById('f-status-grp').style.display = 'none';
            document.getElementById('photo-preview-container').style.display = 'none';
            document.getElementById('f-photo-url').value = '';
            toggleSalaryFields();
            document.getElementById('modal-overlay').classList.add('open');
        }

        function openEditModal(id) {
            const t = allTeachers.find(x => x.id === id);
            if (!t) return;
            document.getElementById('teacher-form').reset();
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Teacher';
            document.getElementById('save-btn').textContent = 'Save Changes';
            document.getElementById('f-name').value = t.full_name;
            document.getElementById('f-email').value = t.email || '';
            document.getElementById('f-phone').value = t.phone || '';
            document.getElementById('f-cnic').value = t.cnic || '';
            document.getElementById('f-address').value = t.address || '';
            document.getElementById('f-emergency').value = t.emergency_contact || '';
            document.getElementById('f-subject').value = t.subject || '';
            document.getElementById('f-qual').value = t.qualification || '';
            document.getElementById('f-joining').value = t.joining_date || '';
            document.getElementById('f-salary-type').value = t.salary_type || 'fixed';
            document.getElementById('f-base-salary').value = t.base_salary || '';
            document.getElementById('f-hourly').value = t.hourly_rate || '';
            document.getElementById('f-status').value = t.status || 'active';
            document.getElementById('f-status-grp').style.display = 'block';
            document.getElementById('f-photo-url').value = t.photo || '';
            if (t.photo) {
                document.getElementById('photo-preview').src = t.photo;
                document.getElementById('photo-preview-container').style.display = 'block';
            } else {
                document.getElementById('photo-preview-container').style.display = 'none';
            }
            toggleSalaryFields();
            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

        async function saveTeacher(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.textContent = 'Saving...';
            
            try {
                let photoUrl = document.getElementById('f-photo-url').value;
                const photoFile = document.getElementById('f-photo').files[0];
                if (photoFile) {
                    btn.textContent = 'Uploading Photo...';
                    photoUrl = await uploadToCloudinary(photoFile);
                }

                const payload = {
                    full_name: document.getElementById('f-name').value,
                    email: document.getElementById('f-email').value,
                    phone: document.getElementById('f-phone').value,
                    cnic: document.getElementById('f-cnic').value,
                    address: document.getElementById('f-address').value,
                    emergency_contact: document.getElementById('f-emergency').value,
                    subject: document.getElementById('f-subject').value,
                    qualification: document.getElementById('f-qual').value,
                    joining_date: document.getElementById('f-joining').value,
                    salary_type: document.getElementById('f-salary-type').value,
                    base_salary: parseFloat(document.getElementById('f-base-salary').value) || null,
                    hourly_rate: parseFloat(document.getElementById('f-hourly').value) || null,
                    status: document.getElementById('f-status').value,
                    photo: photoUrl
                };

                if (editingId) {
                    await API.put(`/users/teachers/${editingId}`, payload);
                    toast('Teacher updated successfully', 'success');
                    closeModal(); loadTeachers();
                } else {
                    const res = await API.post('/users/teachers', payload);
                    closeModal();
                    document.getElementById('cred-title').textContent = '🎉 Account Created';
                    document.getElementById('c-login-id').textContent = res.login_id;
                    document.getElementById('c-temp-pwd').textContent = res.temp_password;
                    document.getElementById('c-name').textContent = res.full_name;
                    document.getElementById('cred-modal').classList.add('open');
                    loadTeachers();
                }
            } catch (err) { toast(err.message, 'error'); }
            finally { btn.disabled = false; btn.textContent = editingId ? 'Save Changes' : 'Add Teacher'; }
        }

        async function resetPassword(id, name, event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Reset Password', `⚠️ WARNING: This will immediately invalidate the current password for ${name}. A new temporary password will be generated. Continue?`)) return;
            
            const row = event.target.closest('tr');
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '⌛';

            try {
                const r = await API.post(`/users/${id}/reset-password`);
                document.getElementById('cred-title').textContent = '🔑 Password Reset';
                document.getElementById('c-login-id').textContent = r.login_id;
                document.getElementById('c-temp-pwd').textContent = r.temp_password;
                document.getElementById('c-name').textContent = name;
                document.getElementById('cred-modal').classList.add('open');
                toast('✅ Password reset successfully', 'success');
            } catch (e) { toast(e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = originalHtml; }
        }

        function copyCreds() {
            const id = document.getElementById('c-login-id').textContent;
            const pwd = document.getElementById('c-temp-pwd').textContent;
            const text = `ClickTake Academy Credentials\nLogin ID: ${id}\nTemp Password: ${pwd}\nURL: ${window.location.origin}/login.html`;
            navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard!', 'success'));
        }

        async function deactivate(id, name, event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Deactivate Account', `Deactivate ${name}? They will no longer be able to login.`)) return;
            try { await API.delete(`/users/${id}`); toast(`${name} deactivated`, 'info'); loadTeachers(); } catch (e) { toast(e.message, 'error'); }
        }

        function printCred() { window.print(); }

        async function resetFace(id, name, isEnrolled, event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            
            if (isEnrolled == '1') {
                if (!await confirmAction('Reset & Re-enroll', `Delete current face data and enroll a new face for ${name} now?`)) return;
                try {
                    await API.post(`/users/reset-face/${id}`);
                    toast('Face data deleted. Starting camera...', 'info');
                } catch (e) { return toast(e.message, 'error'); }
            } else {
                if (!await confirmAction('Enroll Face', `Start camera to enroll face for ${name}?`)) return;
            }

            if (typeof executeEnrollment === 'function') {
                executeEnrollment(id, () => { 
                    toast(`Face enrolled successfully for ${name}`, 'success');
                    loadTeachers(); 
                });
            } else {
                toast('Face authentication module not loaded.', 'error');
            }
        }

        // Auto-open add modal if URL param
        // Event Delegation for Table Actions
        document.getElementById('teachers-tbody').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const enrolled = btn.dataset.enrolled;
            if (btn.classList.contains('action-edit')) openEditModal(parseInt(id));
            else if (btn.classList.contains('action-reset-pwd')) resetPassword(id, name, e);
            else if (btn.classList.contains('action-reset-face')) resetFace(id, name, enrolled, e);
            else if (btn.classList.contains('action-deactivate')) deactivate(id, name, e);
        });

        if (new URLSearchParams(location.search).get('action') === 'add') setTimeout(openAddModal, 500);
        loadTeachers();
    </script>
</body>

</html>
