<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workers — ClickTake Academy</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
</head>

<body class="gradient-mesh">
    <div class="admin-layout" id="app"></div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Add Worker</h3><button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <form id="worker-form" onsubmit="saveWorker(event)">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Full Name <span
                                    class="req">*</span></label><input class="form-control" id="f-name" required></div>
                        <div class="form-group"><label class="form-label">Phone <span class="req">*</span> <small class="text-muted" id="phone-prefix-hint"></small></label><input
                                class="form-control" id="f-phone" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">CNIC</label><input class="form-control" id="f-cnic"></div>
                        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Full Address</label><input class="form-control" id="f-address"></div>
                    <div class="form-group"><label class="form-label">Emergency Contact Number</label><input class="form-control" id="f-emergency" placeholder="Name or Number"></div>
                    <div class="form-group">
                        <label class="form-label">Worker Photo</label>
                        <div class="flex items-center gap-4">
                            <div class="avatar-preview" id="f-photo-preview-container" style="width:60px; height:60px; border-radius:12px; background:var(--bg-700); overflow:hidden; border:1px solid var(--border-medium); display:flex; align-items:center; justify-content:center;">
                                <span id="f-photo-preview-text" style="font-size:1.5rem;">👷</span>
                                <img id="f-photo-preview" style="display:none; width:100%; height:100%; object-fit:cover;">
                            </div>
                            <input type="file" id="f-photo" hidden accept="image/*" onchange="previewImage(this, 'f-photo-preview')">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('f-photo').click()">📸 Choose Photo</button>
                        </div>
                    </div>
                        <div class="form-group"><label class="form-label">Designation</label>
                            <select class="form-control" id="f-designation">
                                <option>Security Guard</option>
                                <option>Cleaner</option>
                                <option>Maintenance</option>
                                <option>Driver</option>
                                <option>Peon</option>
                                <option>Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Shift Start</label><input class="form-control"
                                id="f-shift-start" type="time"></div>
                        <div class="form-group"><label class="form-label">Shift End</label><input class="form-control"
                                id="f-shift-end" type="time"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Hourly Rate</label><input
                            class="form-control" id="f-hourly" type="number" placeholder="e.g. 150"></div>
                    <div class="form-group" id="f-status-grp" style="display:none;"><label
                            class="form-label">Status</label><select class="form-control" id="f-status">
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Add Worker</button>
                </div>
            </form>
        </div>
    </div>
    <div class="modal-overlay" id="cred-modal">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3>🎉 Worker Added</h3><button class="btn-close"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body">
                <div class="cred-slip">
                    <div class="cred-field"><span class="cred-key">Login ID</span><span class="cred-val"
                            id="c-login-id">—</span></div>
                    <div class="cred-field"><span class="cred-key">Temp Password</span><span class="cred-val"
                            id="c-temp-pwd">—</span></div>
                    <div class="cred-field"><span class="cred-key">Name</span><span class="cred-val"
                            id="c-name">—</span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="copyCreds()">📋 Copy</button>
                <button class="btn btn-primary"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">Done</button>
            </div>
        </div>
    <!-- Import Modal -->
    <div class="modal-overlay" id="import-modal" style="z-index: 2000;">
        <div class="modal" style="max-width:800px;">
            <div class="modal-header">
                <h3>📥 Import Workers Data</h3><button class="btn-close" onclick="document.getElementById('import-modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Upload CSV or Excel File</label>
                    <input type="file" id="import-file" class="form-control" accept=".csv, .xlsx, .xls">
                    <small class="text-muted">Required columns: Name, Phone. Optional: Designation, Salary, etc.</small>
                </div>
                <button class="btn btn-secondary" onclick="previewImport('worker')" id="btn-preview-import">Preview Data</button>
                
                <div id="import-preview-section" style="display:none; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong>Preview:</strong>
                        <span id="import-stats" class="text-sm"></span>
                    </div>
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid var(--border-subtle); border-radius: var(--radius-md);">
                        <table class="data-table" style="font-size: 0.85rem;">
                            <thead><tr><th>Row</th><th>Name</th><th>Phone</th><th>Designation</th><th>Status</th></tr></thead>
                            <tbody id="import-preview-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('import-modal').classList.remove('open')">Cancel</button>
                <button class="btn btn-primary" id="btn-confirm-import" style="display:none;" onclick="confirmImport('worker')">Confirm Import</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script src="/js/admin.js"></script>
    <script src="/js/face-api.min.js"></script>
    <script src="/js/face-auth.js"></script>
    <script>
        document.getElementById('app').innerHTML = `
    ${getSidebarHTML('workers')}
    <main class="main-content">
      ${getTopbarHTML('Workers')}
      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h3>👷 All Workers</h3>
            <div class="flex gap-3">
              <div class="search-bar"><span>🔍</span><input type="text" id="search-input" placeholder="Search workers..." oninput="filterTable()" onkeydown="if(event.key==='Enter') filterTable()"></div>
              <div style="display:flex; gap: 0.5rem;">
                  <button class="btn btn-secondary" onclick="openImportModal('worker')">📥 Import</button>
                  <select id="export-format" class="form-control" style="width:80px; padding:8px;" onchange="if(this.value) exportData('worker'); this.value='';">
                      <option value="">Export</option>
                      <option value="csv">CSV</option>
                      <option value="excel">Excel</option>
                      <option value="pdf">PDF</option>
                  </select>
              </div>
              <button class="btn btn-primary" onclick="openAddModal()">➕ Add Worker</button>
            </div>
          </div>
          <table class="data-table">
            <thead><tr><th>Worker</th><th>Designation</th><th>Phone</th><th>Shift</th><th>Face ID</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="workers-tbody"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </main>`;

        initAdminLayout('/admin/workers.html');
        let all = [], editId = null;

        async function loadWorkers() {
            try { all = await API.get('/users/workers'); render(all); } catch (e) { toast(e.message, 'error'); }
        }
        function render(workers) {
            const tbody = document.getElementById('workers-tbody');
            if (!workers.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">No workers found</td></tr>'; return; }
            tbody.innerHTML = workers.map(w => `<tr>
      <td><div class="flex items-center gap-3">
        <div class="avatar" style="background:var(--color-worker);color:#111;overflow:hidden;">
            ${w.photo ? `<img src="${w.photo}" style="width:100%;height:100%;object-fit:cover;">` : avatarLetter(w.full_name)}
        </div>
        <div><div class="font-semibold">${w.full_name}</div><div class="text-xs text-muted">${w.login_id}</div></div>
      </div></td>
      <td><span class="badge badge-purple">${w.designation || '—'}</span></td>
      <td class="text-sm">${w.phone}</td>
      <td class="text-sm text-muted">${w.shift_start || '—'} – ${w.shift_end || '—'}</td>
      <td><span class="badge ${w.is_face_enrolled ? 'badge-green' : 'badge-amber'}" title="Face ID Status">${w.is_face_enrolled ? '🟢 Ready' : '🟡 Pending'}</span></td>
      <td><span class="badge ${w.status === 'active' ? 'badge-green' : 'badge-red'}">${w.status}</span></td>
      <td><div class="flex gap-2">
        <button class="btn btn-sm btn-secondary btn-icon action-edit" data-id="${w.id}" title="Edit">✏️</button>
        <button class="btn btn-sm btn-secondary btn-icon action-reset-pwd" data-id="${w.id}" data-name="${w.full_name.replace(/"/g, '&quot;')}" title="Reset Password">🔑</button>
        <button class="btn btn-sm btn-secondary btn-icon action-reset-face" data-id="${w.id}" data-name="${w.full_name.replace(/"/g, '&quot;')}" data-enrolled="${w.is_face_enrolled}" title="${w.is_face_enrolled ? 'Re-enroll Face' : 'Enroll Face'}">📸</button>
        <button class="btn btn-sm btn-danger btn-icon action-deactivate" data-id="${w.id}" data-name="${w.full_name.replace(/"/g, '&quot;')}" title="Deactivate">🗑️</button>
      </div></td>
    </tr>`).join('');
        }
        function filterTable() { const q = document.getElementById('search-input').value.toLowerCase(); render(all.filter(w => w.full_name.toLowerCase().includes(q) || (w.designation || '').toLowerCase().includes(q) || (w.login_id || '').toLowerCase().includes(q))); }
        function openAddModal() { 
            editId = null; 
            document.getElementById('worker-form').reset(); 
            document.getElementById('f-photo-preview').style.display = 'none';
            document.getElementById('f-photo-preview-text').style.display = 'block';
            document.getElementById('modal-title').textContent = 'Add New Worker'; 
            document.getElementById('save-btn').textContent = 'Add Worker'; 
            document.getElementById('f-status-grp').style.display = 'none'; 
            document.getElementById('modal-overlay').classList.add('open'); 
        }
        function openEditModal(id) {
            const w = all.find(x => x.id === id); if (!w) return; editId = id;
            document.getElementById('modal-title').textContent = 'Edit Worker'; document.getElementById('save-btn').textContent = 'Save Changes';
            document.getElementById('f-name').value = w.full_name; 
            document.getElementById('f-phone').value = w.phone || ''; 
            document.getElementById('f-cnic').value = w.cnic || '';
            document.getElementById('f-email').value = w.email || '';
            document.getElementById('f-address').value = w.address || '';
            document.getElementById('f-emergency').value = w.emergency_contact || '';
            document.getElementById('f-designation').value = w.designation || 'Security Guard'; 
            document.getElementById('f-shift-start').value = w.shift_start || ''; 
            document.getElementById('f-shift-end').value = w.shift_end || ''; 
            document.getElementById('f-hourly').value = w.hourly_rate || ''; 
            document.getElementById('f-status').value = w.status || 'active'; 
            document.getElementById('f-status-grp').style.display = 'block';
            
            const preview = document.getElementById('f-photo-preview');
            const previewText = document.getElementById('f-photo-preview-text');
            if (w.photo) {
                preview.src = w.photo;
                preview.style.display = 'block';
                previewText.style.display = 'none';
            } else {
                preview.style.display = 'none';
                previewText.style.display = 'block';
            }
            
            document.getElementById('modal-overlay').classList.add('open');
        }
        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
        function previewImage(input, previewId) {
            const preview = document.getElementById(previewId);
            const previewText = document.getElementById(previewId + '-text');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    if (previewText) previewText.style.display = 'none';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function saveWorker(e) {
            e.preventDefault(); 
            const btn = document.getElementById('save-btn'); 
            btn.disabled = true; btn.textContent = 'Saving...';
            
            const p = { 
                full_name: document.getElementById('f-name').value, 
                phone: document.getElementById('f-phone').value, 
                cnic: document.getElementById('f-cnic').value, 
                email: document.getElementById('f-email').value,
                address: document.getElementById('f-address').value,
                emergency_contact: document.getElementById('f-emergency').value,
                designation: document.getElementById('f-designation').value, 
                shift_start: document.getElementById('f-shift-start').value, 
                shift_end: document.getElementById('f-shift-end').value, 
                hourly_rate: parseFloat(document.getElementById('f-hourly').value) || null, 
                status: document.getElementById('f-status').value 
            };

            const photoFile = document.getElementById('f-photo').files[0];
            
            try {
                if (photoFile) {
                    if (photoFile.size > 2 * 1024 * 1024) throw new Error('Photo too large! Max 2MB allowed.');
                    p.photo = await uploadToCloudinary(photoFile);
                }

                if (editId) { 
                    await API.put(`/users/workers/${editId}`, p); 
                    toast('Worker updated', 'success'); 
                    closeModal(); 
                    loadWorkers(); 
                } else { 
                    const r = await API.post('/users/workers', p); 
                    closeModal(); 
                    document.getElementById('c-login-id').textContent = r.login_id; 
                    document.getElementById('c-temp-pwd').textContent = r.temp_password; 
                    document.getElementById('c-name').textContent = r.full_name; 
                    document.getElementById('cred-modal').classList.add('open'); 
                    loadWorkers(); 
                }
            } catch (err) { 
                toast(err.message, 'error'); 
            } finally { 
                btn.disabled = false; btn.textContent = editId ? 'Save Changes' : 'Add Worker'; 
            }
        }
        async function deactivate(id, name, event) { 
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Deactivate Worker', `Remove ${name} from active staff?`)) return; 
            try { await API.delete(`/users/${id}`); toast(`${name} deactivated`, 'info'); loadWorkers(); } catch (e) { toast(e.message, 'error'); } 
        }

        async function resetPwd(id, name, event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Reset Password', `⚠️ WARNING: This will immediately invalidate the current password for ${name}. A new temporary password will be generated. Continue?`)) return;
            
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '⌛';

            try {
                const r = await API.post(`/users/${id}/reset-password`);
                document.getElementById('c-login-id').textContent = r.login_id;
                document.getElementById('c-temp-pwd').textContent = r.temp_password;
                document.getElementById('c-name').textContent = name;
                document.getElementById('cred-modal').classList.add('open');
                toast('✅ Password reset successfully', 'success');
            } catch (e) { toast(e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = originalHtml; }
        }

        function copyCreds() {
            const id = document.getElementById('c-login-id').textContent;
            const pwd = document.getElementById('c-temp-pwd').textContent;
            const text = `ClickTake Academy Credentials\nLogin ID: ${id}\nTemp Password: ${pwd}\nURL: ${window.location.origin}/login.html`;
            navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard!', 'success'));
        }

        async function resetFace(id, name, isEnrolled, event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }
            
            if (isEnrolled == '1') {
                if (!await confirmAction('Reset & Re-enroll', `Delete current face data and enroll a new face for ${name} now?`)) return;
                try {
                    await API.post(`/users/reset-face/${id}`);
                    toast('Face data deleted. Starting camera...', 'info');
                } catch (e) { return toast(e.message, 'error'); }
            } else {
                if (!await confirmAction('Enroll Face', `Start camera to enroll face for ${name}?`)) return;
            }

            if (typeof executeEnrollment === 'function') {
                executeEnrollment(id, () => { 
                    toast(`Face enrolled successfully for ${name}`, 'success');
                    loadWorkers(); 
                });
            } else {
                toast('Face authentication module not loaded.', 'error');
            }
        }

        // Event Delegation for Table Actions
        document.getElementById('workers-tbody').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const enrolled = btn.dataset.enrolled;
            if (btn.classList.contains('action-edit')) openEditModal(parseInt(id));
            else if (btn.classList.contains('action-reset-pwd')) resetPwd(id, name, e);
            else if (btn.classList.contains('action-reset-face')) resetFace(id, name, enrolled, e);
            else if (btn.classList.contains('action-deactivate')) deactivate(id, name, e);
        });

        if (new URLSearchParams(location.search).get('action') === 'add') setTimeout(openAddModal, 500);
        loadWorkers();

        // Import / Export Logic
        function exportData(role) {
            const format = document.getElementById('export-format').value;
            window.location.href = `/api/data/export/${role}?format=${format}`;
        }

        function openImportModal(role) {
            document.getElementById('import-file').value = '';
            document.getElementById('import-preview-section').style.display = 'none';
            document.getElementById('btn-confirm-import').style.display = 'none';
            document.getElementById('import-modal').classList.add('open');
        }

        let pendingImportRecords = [];

        async function previewImport(role) {
            const fileInput = document.getElementById('import-file');
            if (!fileInput.files.length) return toast('Please select a file', 'warning');

            const btn = document.getElementById('btn-preview-import');
            btn.disabled = true; btn.textContent = 'Parsing...';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`/api/data/import/${role}/preview`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() },
                    body: formData
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || 'Preview failed');

                pendingImportRecords = data.preview.filter(r => r.isValid).map(r => r.mapped);
                
                document.getElementById('import-stats').innerHTML = `Total: ${data.total} | <span style="color:var(--color-accent-teal)">Valid: ${data.valid}</span> | <span style="color:var(--color-accent-rose)">Invalid: ${data.invalid}</span>`;
                
                let tbody = '';
                data.preview.slice(0, 50).forEach(r => {
                    const statusHtml = r.isValid ? '<span style="color:var(--color-accent-teal)">✅ Valid</span>' : `<span style="color:var(--color-accent-rose)">❌ ${r.errors.join(', ')}</span>`;
                    tbody += `<tr><td>${r.row}</td><td>${r.mapped.full_name || '-'}</td><td>${r.mapped.phone || '-'}</td><td>${r.mapped.designation || '-'}</td><td>${statusHtml}</td></tr>`;
                });
                document.getElementById('import-preview-tbody').innerHTML = tbody;
                
                document.getElementById('import-preview-section').style.display = 'block';
                if (pendingImportRecords.length > 0) {
                    document.getElementById('btn-confirm-import').style.display = 'inline-flex';
                    document.getElementById('btn-confirm-import').textContent = `Import ${pendingImportRecords.length} Records`;
                }
            } catch (err) {
                toast(err.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Preview Data';
            }
        }

        async function confirmImport(role) {
            if (!pendingImportRecords.length) return;
            const btn = document.getElementById('btn-confirm-import');
            btn.disabled = true; btn.textContent = 'Importing...';

            try {
                const res = await API.post(`/data/import/${role}/confirm`, { records: pendingImportRecords });
                toast(`Successfully imported ${res.count} records. Downloading credentials...`, 'success');
                
                if (res.results && res.results.length > 0) {
                    let csvContent = "data:text/csv;charset=utf-8,Login ID,Full Name,Password\n";
                    res.results.forEach(r => {
                        csvContent += `${r.login_id},${r.full_name},${r.password}\n`;
                    });
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `${role}_credentials.csv`);
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                }

                document.getElementById('import-modal').classList.remove('open');
                loadWorkers();
            } catch (err) {
                toast(err.message, 'error');
                btn.disabled = false; btn.textContent = 'Confirm Import';
            }
        }
    </script>
</body>

</html>
