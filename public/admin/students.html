<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students — ClickTake Academy</title>
    <link rel="stylesheet" href="/css/design-system.css?v=2.6.5">
    <link rel="stylesheet" href="/css/components.css?v=2.6.5">
    <link rel="stylesheet" href="/css/animations.css?v=2.6.5">
</head>

<body class="gradient-mesh">
    <div class="admin-layout" id="app"></div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="modal-overlay" style="z-index: 2000;">
        <div class="modal" style="max-width:620px;">
            <div class="modal-header">
                <h3 id="modal-title">Add Student</h3>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <form id="student-form" onsubmit="saveStudent(event)">
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Full Name <span class="req">*</span></label><input class="form-control" id="f-name" required placeholder="Student full name"></div>
                        <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="f-email" type="email" placeholder="e.g. student@example.com"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Phone <small class="text-muted" id="phone-prefix-hint"></small></label><input class="form-control" id="f-phone" placeholder="03xx-xxxxxxx"></div>
                        <div class="form-group"><label class="form-label">Emergency Contact</label><input class="form-control" id="f-emergency" placeholder="03xx-xxxxxxx"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Class <span class="req">*</span></label><input class="form-control" id="f-class" required placeholder="e.g. Class 10"></div>
                        <div class="form-group"><label class="form-label">Section</label><input class="form-control" id="f-section" placeholder="e.g. A, B, C"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Roll No</label><input class="form-control" id="f-roll" placeholder="e.g. 1024"></div>
                        <div class="form-group"><label class="form-label">CNIC</label><input class="form-control" id="f-cnic" placeholder="00000-0000000-0"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Parent Name</label><input class="form-control" id="f-parent" placeholder="Father/Guardian name"></div>
                        <div class="form-group"><label class="form-label">Parent Phone</label><input class="form-control" id="f-parent-phone" placeholder="03xx-xxxxxxx"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Fees Per Month (Rs)</label><input type="number" class="form-control" id="f-fees-per-month" placeholder="e.g. 5000"></div>
                        <div class="form-group"><label class="form-label">Fees Due Date</label><input class="form-control" id="f-fees-due-date" placeholder="e.g. 5th of every month"></div>
                    </div>
                    <div class="form-group"><label class="form-label">Full Address</label><textarea class="form-control" id="f-address" rows="2" placeholder="Student's residential address..."></textarea></div>
                    <div class="form-group"><label class="form-label">Medical Notes</label><textarea class="form-control" id="f-medical" rows="2" placeholder="Any allergies or medical conditions..."></textarea></div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Student Photo</label>
                            <input type="file" class="form-control" id="f-photo" accept="image/*" onchange="previewImage(this, 'photo-preview')">
                            <div id="photo-preview-container" class="mt-2" style="display:none;">
                                <img id="photo-preview" src="" style="width:100px;height:100px;object-fit:cover;border-radius:var(--radius-md);">
                            </div>
                            <input type="hidden" id="f-photo-url">
                        </div>
                        <div class="form-group" id="f-status-grp" style="display:none;">
                            <label class="form-label">Status</label>
                            <select class="form-control" id="f-status">
                                <option value="active">Active</option>
                                <option value="inactive">Inactive (Alumni)</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="save-btn">Add Student</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Credential Slip -->
    <div class="modal-overlay" id="cred-modal" style="z-index: 2000;">
        <div class="modal" style="max-width:400px;">
            <div class="modal-header">
                <h3 id="cred-title">🎉 Student Added</h3><button class="btn-close"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body">
                <p class="text-secondary text-sm" style="margin-bottom:var(--space-4);">Share these login credentials
                    with the student or parent.</p>
                <div class="cred-slip">
                    <div class="cred-field"><span class="cred-key">Login ID</span><span class="cred-val"
                            id="c-login-id">—</span></div>
                    <div class="cred-field"><span class="cred-key">Temp Password</span><span class="cred-val"
                            id="c-temp-pwd">—</span></div>
                    <div class="cred-field"><span class="cred-key">Name</span><span class="cred-val"
                            id="c-name">—</span></div>
                    <div class="cred-field"><span class="cred-key">Portal URL</span><span class="cred-val text-sm"
                            style="color:var(--color-accent-teal);">/login.html?role=student</span></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="copyCreds()">📋 Copy</button>
                <button class="btn btn-secondary" onclick="window.print()">🖨️ Print</button>
                <button class="btn btn-primary"
                    onclick="document.getElementById('cred-modal').classList.remove('open')">Done</button>
            </div>
        </div>
    </div>

    </div>

    <!-- Import Modal -->
    <div class="modal-overlay" id="import-modal" style="z-index: 2000;">
        <div class="modal" style="max-width:800px;">
            <div class="modal-header">
                <h3>📥 Import Students Data</h3><button class="btn-close" onclick="document.getElementById('import-modal').classList.remove('open')">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Upload CSV or Excel File</label>
                    <input type="file" id="import-file" class="form-control" accept=".csv, .xlsx, .xls" onchange="previewImport('student')">
                    <small class="text-muted">Required columns: Name, Class. Optional: Phone, Email, Address, Parent Name, etc.</small>
                </div>
                
                <div id="import-preview-section" style="display:none; margin-top:20px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                        <strong>Preview:</strong>
                        <span id="import-stats" class="text-sm"></span>
                    </div>
                    <div style="max-height: 300px; overflow-y: auto; border: 1px solid var(--border-subtle); border-radius: var(--radius-md);">
                        <table class="data-table" style="font-size: 0.85rem;">
                            <thead><tr><th>Row</th><th>Name</th><th>Phone</th><th>Class</th><th>Status</th></tr></thead>
                            <tbody id="import-preview-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('import-modal').classList.remove('open')">Cancel</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn btn-secondary" onclick="previewImport('student')" id="btn-preview-import">Preview Data</button>
                    <button class="btn btn-secondary" onclick="downloadTemplate('student')" style="background:var(--bg-600);">📄 Download Template</button>
                </div>
                <button class="btn btn-primary" onclick="confirmImport('student')" id="btn-confirm-import" style="display:none;">Confirm Import</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <script src="/js/api.js?v=2.6.5"></script>
    <script src="/js/admin.js?v=2.6.5"></script>
    <script src="/js/face-api.min.js?v=2.6.5"></script>
    <script src="/js/face-auth.js?v=2.6.5"></script>
    <script>
        document.getElementById('app').innerHTML = `
    ${getSidebarHTML('students')}
    <main class="main-content">
      ${getTopbarHTML('Students')}
      <div class="page-content">
        <div class="table-container">
          <div class="table-header">
            <h3>🎓 All Students</h3>
            <div class="flex items-center gap-3">
              <div class="search-bar"><span>🔍</span><input type="text" id="search-input" placeholder="Search by name, roll no..." oninput="filterTable()" onkeydown="if(event.key==='Enter') filterTable()"></div>
              <input class="form-control" style="width:130px;padding:8px 12px;" id="class-filter" placeholder="Filter class" oninput="filterTable()">
              <select class="form-control" style="width:130px;padding:8px 12px;" id="export-format">
                <option value="csv">Export CSV</option>
                <option value="excel">Export Excel</option>
                <option value="pdf">Export PDF</option>
              </select>
              <button class="btn btn-secondary" onclick="exportData('student')">📤 Export</button>
              <button class="btn btn-secondary" onclick="openImportModal('student')">📥 Import</button>
              <button class="btn btn-primary" onclick="openAddModal()">➕ Add Student</button>
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table class="data-table" id="students-table">
              <thead><tr><th>Student</th><th>Class</th><th>Roll No</th><th>Face ID</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody id="students-tbody"><tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>`;

        initAdminLayout('/admin/students.html');
        let allStudents = [], editingId = null;

        async function loadStudents() {
            try { allStudents = await API.get('/users/students'); renderTable(allStudents); } catch (e) { toast(e.message, 'error'); }
        }

        function renderTable(students) {
            const tbody = document.getElementById('students-tbody');
            if (!students.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">No students found</td></tr>'; return; }
            tbody.innerHTML = students.map(s => `<tr>
      <td><div class="flex items-center gap-3">
        <div class="avatar" style="background:var(--color-student);color:#111;overflow:hidden;">
            ${s.photo ? `<img src="${s.photo}" style="width:100%;height:100%;object-fit:cover;">` : avatarLetter(s.full_name)}
        </div>
        <div><div class="font-semibold">${s.full_name}</div><div class="text-xs text-muted">${s.login_id}</div></div>
      </div></td>
      <td><span class="badge badge-blue">${s.class_name || '—'}${s.section ? ' - ' + s.section : ''}</span></td>
      <td>${s.roll_no || '—'}</td>
      <td><span class="badge ${s.is_face_enrolled ? 'badge-green' : 'badge-amber'}" title="Face ID Status">${s.is_face_enrolled ? '🟢 Ready' : '🟡 Pending'}</span></td>
      <td><span class="badge ${s.status === 'active' ? 'badge-green' : 'badge-red'}">${s.status}</span></td>
        <td><div class="flex gap-2">
        <button class="btn btn-sm btn-secondary btn-icon action-edit" data-id="${s.id}" title="Edit">✏️</button>
        <button class="btn btn-sm btn-secondary btn-icon action-reset-pwd" data-id="${s.id}" data-name="${s.full_name.replace(/"/g, '&quot;')}" title="Reset Password">🔑</button>
        <button class="btn btn-sm btn-secondary btn-icon action-reset-face" data-id="${s.id}" data-name="${s.full_name.replace(/"/g, '&quot;')}" data-enrolled="${s.is_face_enrolled}" title="${s.is_face_enrolled ? 'Re-enroll Face' : 'Enroll Face'}">📸</button>
        <button class="btn btn-sm btn-danger btn-icon action-deactivate" data-id="${s.id}" data-name="${s.full_name.replace(/"/g, '&quot;')}" title="Deactivate">🗑️</button>
      </div></td>
    </tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const c = document.getElementById('class-filter').value.toLowerCase();
            renderTable(allStudents.filter(s =>
                (!q || s.full_name.toLowerCase().includes(q) || (s.roll_no || '').toLowerCase().includes(q)) &&
                (!c || (s.class_name || '').toLowerCase().includes(c))
            ));
        }

        function previewImage(input, previewId) {
            const container = document.getElementById(previewId + '-container');
            const preview = document.getElementById(previewId);
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    container.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('student-form').reset();
            document.getElementById('modal-title').textContent = 'Add New Student';
            document.getElementById('save-btn').textContent = 'Add Student';
            document.getElementById('f-status-grp').style.display = 'none';
            document.getElementById('photo-preview-container').style.display = 'none';
            document.getElementById('f-photo-url').value = '';
            document.getElementById('modal-overlay').classList.add('open');
        }

        function openEditModal(id) {
            const s = allStudents.find(x => x.id === id); if (!s) return;
            document.getElementById('student-form').reset();
            editingId = id;
            document.getElementById('modal-title').textContent = 'Edit Student';
            document.getElementById('save-btn').textContent = 'Save Changes';
            document.getElementById('f-name').value = s.full_name;
            document.getElementById('f-email').value = s.email || '';
            document.getElementById('f-phone').value = s.phone || '';
            document.getElementById('f-class').value = s.class_name || '';
            document.getElementById('f-section').value = s.section || '';
            document.getElementById('f-roll').value = s.roll_no || '';
            document.getElementById('f-cnic').value = s.cnic || '';
            document.getElementById('f-address').value = s.address || '';
            document.getElementById('f-emergency').value = s.emergency_contact || '';
            document.getElementById('f-parent').value = s.parent_name || '';
            document.getElementById('f-parent-phone').value = s.parent_phone || '';
            document.getElementById('f-fees-per-month').value = s.base_salary || '';
            document.getElementById('f-fees-due-date').value = s.subject || '';
            document.getElementById('f-medical').value = s.medical_notes || '';
            document.getElementById('f-status').value = s.status || 'active';
            document.getElementById('f-status-grp').style.display = 'block';
            document.getElementById('f-photo-url').value = s.photo || '';
            if (s.photo) {
                document.getElementById('photo-preview').src = s.photo;
                document.getElementById('photo-preview-container').style.display = 'block';
            } else {
                document.getElementById('photo-preview-container').style.display = 'none';
            }
            document.getElementById('modal-overlay').classList.add('open');
        }

        function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

        async function saveStudent(e) {
            e.preventDefault();
            const btn = document.getElementById('save-btn'); btn.disabled = true; btn.textContent = 'Saving...';
            
            try {
                let photoUrl = document.getElementById('f-photo-url').value;
                const photoFile = document.getElementById('f-photo').files[0];
                if (photoFile) {
                    btn.textContent = 'Uploading Photo...';
                    photoUrl = await uploadToCloudinary(photoFile);
                }

                const payload = { 
                    full_name: document.getElementById('f-name').value, 
                    email: document.getElementById('f-email').value,
                    phone: document.getElementById('f-phone').value, 
                    cnic: document.getElementById('f-cnic').value, 
                    address: document.getElementById('f-address').value,
                    emergency_contact: document.getElementById('f-emergency').value,
                    roll_no: document.getElementById('f-roll').value, 
                    class_name: document.getElementById('f-class').value, 
                    section: document.getElementById('f-section').value, 
                    parent_name: document.getElementById('f-parent').value, 
                    parent_phone: document.getElementById('f-parent-phone').value, 
                    fees_per_month: document.getElementById('f-fees-per-month').value || null,
                    fees_due_date: document.getElementById('f-fees-due-date').value || null,
                    medical_notes: document.getElementById('f-medical').value, 
                    status: document.getElementById('f-status').value,
                    photo: photoUrl
                };

                if (editingId) { await API.put(`/users/students/${editingId}`, payload); toast('Student updated', 'success'); closeModal(); loadStudents(); }
                else { 
                    const r = await API.post('/users/students', payload); 
                    closeModal(); 
                    document.getElementById('cred-title').textContent = '🎉 Student Added';
                    document.getElementById('c-login-id').textContent = r.login_id; 
                    document.getElementById('c-temp-pwd').textContent = r.temp_password; 
                    document.getElementById('c-name').textContent = r.full_name; 
                    document.getElementById('cred-modal').classList.add('open'); 
                    loadStudents(); 
                }
            } catch (err) { toast(err.message, 'error'); }
            finally { btn.disabled = false; btn.textContent = editingId ? 'Save Changes' : 'Add Student'; }
        }

        async function deactivate(id, name, event) {
            console.log('Deactivate triggered', id, name);
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Confirm Deactivation', `Remove ${name} from active students?`)) return;
            try { await API.delete(`/users/${id}`); toast(`${name} deactivated`, 'info'); loadStudents(); } catch (e) { toast(e.message, 'error'); }
        }

        async function resetPwd(id, name, event) {
            console.log('Reset Pwd triggered', id, name);
            if (event) { event.preventDefault(); event.stopPropagation(); }
            if (!await confirmAction('Reset Password', `⚠️ WARNING: This will immediately invalidate the current password for ${name}. A new temporary password will be generated. Continue?`)) return;
            
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;
            btn.disabled = true; btn.innerHTML = '⌛';

            try {
                const r = await API.post(`/users/${id}/reset-password`);
                document.getElementById('cred-title').textContent = '🔑 Password Reset';
                document.getElementById('c-login-id').textContent = r.login_id;
                document.getElementById('c-temp-pwd').textContent = r.temp_password;
                document.getElementById('c-name').textContent = name;
                document.getElementById('cred-modal').classList.add('open');
                toast('✅ Password reset successfully', 'success');
            } catch (e) { toast(e.message, 'error'); }
            finally { btn.disabled = false; btn.innerHTML = originalHtml; }
        }

        function copyCreds() {
            const id = document.getElementById('c-login-id').textContent;
            const pwd = document.getElementById('c-temp-pwd').textContent;
            const text = `ClickTake Academy Credentials\nLogin ID: ${id}\nTemp Password: ${pwd}\nURL: ${window.location.origin}/login.html`;
            navigator.clipboard.writeText(text).then(() => toast('Copied to clipboard!', 'success'));
        }

        async function resetFace(id, name, isEnrolled, event) {
            console.log('Reset Face triggered', id, name);
            if (event) { event.preventDefault(); event.stopPropagation(); }
            
            if (isEnrolled == '1') {
                if (!await confirmAction('Reset & Re-enroll', `Delete current face data and enroll a new face for ${name} now?`)) return;
                try {
                    await API.post(`/users/reset-face/${id}`);
                    toast('Face data deleted. Starting camera...', 'info');
                } catch (e) { return toast(e.message, 'error'); }
            } else {
                if (!await confirmAction('Enroll Face', `Start camera to enroll face for ${name}?`)) return;
            }

            if (typeof executeEnrollment === 'function') {
                executeEnrollment(id, () => { 
                    toast(`Face enrolled successfully for ${name}`, 'success');
                    loadStudents(); 
                });
            } else {
                toast('Face authentication module not loaded.', 'error');
            }
        }

        // Event Delegation for Table Actions
        document.getElementById('students-tbody').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const enrolled = btn.dataset.enrolled;
            if (btn.classList.contains('action-edit')) openEditModal(parseInt(id));
            else if (btn.classList.contains('action-reset-pwd')) resetPwd(id, name, e);
            else if (btn.classList.contains('action-reset-face')) resetFace(id, name, enrolled, e);
            else if (btn.classList.contains('action-deactivate')) deactivate(id, name, e);
        });

        // Import / Export Logic
        function exportData(role) {
            const format = document.getElementById('export-format').value;
            window.location.href = `/api/data/export/${role}?format=${format}`;
        }

        function openImportModal(role) {
            document.getElementById('import-file').value = '';
            document.getElementById('import-preview-section').style.display = 'none';
            document.getElementById('btn-confirm-import').style.display = 'none';
            document.getElementById('import-modal').classList.add('open');
        }

        let pendingImportRecords = [];

        async function previewImport(role) {
            const fileInput = document.getElementById('import-file');
            if (!fileInput.files.length) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // Show a parsing indicator
            document.getElementById('import-preview-section').style.display = 'block';
            document.getElementById('import-stats').innerHTML = `Parsing...`;
            document.getElementById('import-preview-tbody').innerHTML = '<tr><td colspan="5" class="text-center">Loading...</td></tr>';
            document.getElementById('btn-confirm-import').style.display = 'none';

            try {
                const res = await fetch(`${API_BASE || '/api'}/data/import/${role}/preview`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() },
                    body: formData
                });
                
                let data;
                try {
                    data = await res.json();
                } catch (parseErr) {
                    throw new Error('Server returned an invalid response. The file might be too large or the server encountered an error.');
                }
                
                if(!res.ok) throw new Error(data.error || 'Preview failed');

                pendingImportRecords = data.preview.filter(r => r.isValid).map(r => r.mapped);
                
                document.getElementById('import-stats').innerHTML = `Total: ${data.total} | <span style="color:var(--color-accent-teal)">Valid: ${data.valid}</span> | <span style="color:var(--color-accent-rose)">Invalid: ${data.invalid}</span>`;
                
                let tbody = '';
                data.preview.slice(0, 50).forEach(r => {
                    let statusHtml = '';
                    if (r.isValid) {
                        if (r.warnings && r.warnings.length > 0) {
                            statusHtml = `<span style="color:var(--color-accent-amber)" title="${r.warnings.join(', ')}">⚠️ Valid (Missing ${r.warnings.length} fields)</span>`;
                        } else {
                            statusHtml = `<span style="color:var(--color-accent-teal)">✅ Valid</span>`;
                        }
                    } else {
                        statusHtml = `<span style="color:var(--color-accent-rose)">❌ ${r.errors.join(', ')}</span>`;
                    }
                    tbody += `<tr><td>${r.row}</td><td>${r.mapped.full_name || '-'}</td><td>${r.mapped.phone || '-'}</td><td>${r.mapped.class_name || '-'}</td><td>${statusHtml}</td></tr>`;
                });
                document.getElementById('import-preview-tbody').innerHTML = tbody;
                
                document.getElementById('import-preview-section').style.display = 'block';
                if(data.valid > 0) document.getElementById('btn-confirm-import').style.display = 'inline-block';
                else document.getElementById('btn-confirm-import').style.display = 'none';

            } catch (err) {
                toast(err.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Preview Data';
            }
        }

        async function confirmImport(role) {
            if (!pendingImportRecords.length) return;
            const btn = document.getElementById('btn-confirm-import');
            btn.disabled = true; btn.textContent = 'Importing...';

            try {
                const res = await API.post(`/data/import/${role}/confirm`, { records: pendingImportRecords });
                toast(`Successfully imported ${res.count} records. Downloading credentials...`, 'success');
                
                if (res.results && res.results.length > 0) {
                    let csvContent = "data:text/csv;charset=utf-8,Login ID,Full Name,Password\n";
                    res.results.forEach(r => {
                        csvContent += `${r.login_id},${r.full_name},${r.password}\n`;
                    });
                    const encodedUri = encodeURI(csvContent);
                    const link = document.createElement("a");
                    link.setAttribute("href", encodedUri);
                    link.setAttribute("download", `${role}_credentials.csv`);
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                }

                document.getElementById('import-modal').classList.remove('open');
                loadStudents();
            } catch (err) {
                toast(err.message, 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Confirm Import';
            }
        }
        
        function downloadTemplate(role) {
            let headers = "Full Name,Phone,Email,Address,Class,Parent Name,Parent Phone,Fees Per Month,Fees Due Date\n";
            headers += "John Doe,03001234567,john@example.com,123 Main St,Year 5,Jane Doe,03001234567,2500,5\n";
            const encodedUri = encodeURI("data:text/csv;charset=utf-8," + headers);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `${role}_import_template.csv`);
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        if (new URLSearchParams(location.search).get('action') === 'add') setTimeout(openAddModal, 500);
        loadStudents();
    </script>
</body>

</html>
