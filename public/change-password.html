<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — ClickTake Academy</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/animations.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse 70% 50% at 30% 30%, rgba(108, 99, 255, 0.15) 0%, transparent 60%), var(--bg-900);
        }

        .wrap {
            width: 100%;
            max-width: 460px;
            padding: var(--space-6);
            animation: fadeInUp 0.5s ease;
        }

        .card {
            background: linear-gradient(135deg, var(--bg-600), var(--bg-500));
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-2xl);
            overflow: hidden;
        }

        .card-top {
            padding: var(--space-8);
            text-align: center;
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.15), transparent);
            border-bottom: 1px solid var(--border-subtle);
        }

        .card-top .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
        }

        .card-body {
            padding: var(--space-8);
            display: flex;
            flex-direction: column;
            gap: var(--space-5);
        }

        .strength-bar {
            height: 4px;
            background: var(--bg-400);
            border-radius: var(--radius-full);
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 0.3s ease, background 0.3s ease;
            width: 0;
        }

        .strength-label {
            font-size: 0.75rem;
            margin-top: 4px;
        }

        .req-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .req-list li {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .req-list li.met {
            color: var(--color-accent-green);
        }

        .req-list li::before {
            content: '○';
            flex-shrink: 0;
        }

        .req-list li.met::before {
            content: '✓';
        }
    </style>
</head>

<body>
    <div class="orb orb-1"></div>
    <div class="wrap">
        <div class="card">
            <div class="card-top">
                <span class="icon">🔐</span>
                <h1 style="font-family:var(--font-display);font-size:1.4rem;font-weight:800;">Set Your Password</h1>
                <p style="color:var(--text-secondary);font-size:0.9rem;margin-top:8px;">This is your first login. Please
                    set a secure password to continue.</p>
            </div>
            <form class="card-body" id="cp-form" onsubmit="handleChange(event)">
                <div class="form-group">
                    <label class="form-label">Current (Temporary) Password <span class="req">*</span></label>
                    <div class="form-control-icon">
                        <span class="icon">🔑</span>
                        <input class="form-control" id="current-pwd" type="password"
                            placeholder="Enter temporary password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">New Password <span class="req">*</span></label>
                    <div class="form-control-icon">
                        <span class="icon">🆕</span>
                        <input class="form-control" id="new-pwd" type="password" placeholder="Min. 8 characters"
                            required oninput="checkStrength()">
                    </div>
                    <div class="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <div class="strength-label" id="strength-label" style="color:var(--text-muted);">Enter a password
                    </div>
                    <ul class="req-list" id="reqs">
                        <li id="req-len">At least 8 characters</li>
                        <li id="req-upper">One uppercase letter</li>
                        <li id="req-num">One number</li>
                    </ul>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password <span class="req">*</span></label>
                    <div class="form-control-icon">
                        <span class="icon">✅</span>
                        <input class="form-control" id="confirm-pwd" type="password" placeholder="Repeat new password"
                            required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="cp-btn"
                    style="width:100%;padding:14px;font-size:1rem;font-weight:700;border-radius:var(--radius-lg);">
                    Set Password & Continue →
                </button>
            </form>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="/js/api.js"></script>
    <script>
        if (!getUser() || !getToken()) { window.location.href = '/login.html'; }

        function checkStrength() {
            const pwd = document.getElementById('new-pwd').value;
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            const reqLen = document.getElementById('req-len');
            const reqUpper = document.getElementById('req-upper');
            const reqNum = document.getElementById('req-num');

            const hasLen = pwd.length >= 8;
            const hasUpper = /[A-Z]/.test(pwd);
            const hasNum = /[0-9]/.test(pwd);

            reqLen.classList.toggle('met', hasLen);
            reqUpper.classList.toggle('met', hasUpper);
            reqNum.classList.toggle('met', hasNum);

            const score = [hasLen, hasUpper, hasNum].filter(Boolean).length;
            const configs = [
                { w: '0%', c: '', t: '' },
                { w: '33%', c: '#FF4757', t: 'Weak' },
                { w: '66%', c: '#F7B731', t: 'Fair' },
                { w: '100%', c: '#2ED573', t: 'Strong' },
            ];
            const cfg = configs[score];
            fill.style.width = cfg.w; fill.style.background = cfg.c;
            label.textContent = cfg.t; label.style.color = cfg.c;
        }

        async function handleChange(e) {
            e.preventDefault();
            const user = getUser();
            const current = document.getElementById('current-pwd').value;
            const newPwd = document.getElementById('new-pwd').value;
            const confirm = document.getElementById('confirm-pwd').value;
            if (newPwd !== confirm) { toast('Passwords do not match', 'error'); return; }
            if (newPwd.length < 8) { toast('Password too short', 'error'); return; }

            const btn = document.getElementById('cp-btn');
            btn.disabled = true; btn.textContent = 'Saving...';

            try {
                const data = await API.post('/auth/change-password', { login_id: user.login_id, current_password: current, new_password: newPwd });
                localStorage.setItem('ams_token', data.token);
                const updatedUser = { ...user, temp_password: false };
                localStorage.setItem('ams_user', JSON.stringify(updatedUser));

                toast('Password changed successfully! Welcome 🎉', 'success');
                const redirectMap = { admin: '/admin/dashboard.html', teacher: '/teacher/dashboard.html', student: '/student/dashboard.html', worker: '/worker/dashboard.html' };
                setTimeout(() => window.location.href = redirectMap[user.role] || '/', 1200);
            } catch (err) {
                toast(err.message, 'error'); btn.disabled = false; btn.textContent = 'Set Password & Continue →';
            }
        }
    </script>
</body>

</html>
